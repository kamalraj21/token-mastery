// ─── ZERO-DEPENDENCY MINI RUNTIME ─────────────────────────────────────────
// Implements the React API subset we use: createElement, useState, useEffect, createRoot
// Renders to real DOM — no virtual DOM diffing needed for this app size
(function(){
'use strict';

// ── State & rendering ──
let _rootEl = null;
let _rootComponent = null;
let _rootProps = null;
let _renderScheduled = false;

const stateMap = new Map();
const effectMap = new Map();
let _currentKey = '';
let _stateIndex = 0;
let _effectIndex = 0;
let _renderPass = 0;

function scheduleRender() {
  if (_renderScheduled) return;
  _renderScheduled = true;
  Promise.resolve().then(() => {
    _renderScheduled = false;
    if (_rootEl && _rootComponent) performRender();
  });
}

function performRender() {
  _renderPass++;
  _currentKey = 'root';
  _stateIndex = 0;
  _effectIndex = 0;
  const vnode = _rootComponent(_rootProps || {});
  patch(_rootEl, vnode);
  runEffects();
}

// ── createElement ──
function createElement(type, props) {
  const children = Array.prototype.slice.call(arguments, 2).flat(Infinity).filter(c => c !== null && c !== undefined && c !== false);
  return { type, props: props || {}, children };
}

// ── Hooks ──
function useState(initial) {
  const key = _currentKey;
  const idx = _stateIndex++;
  const mapKey = key + ':' + idx;
  if (!stateMap.has(mapKey)) {
    stateMap.set(mapKey, typeof initial === 'function' ? initial() : initial);
  }
  const setState = (function(k) {
    return function(val) {
      const prev = stateMap.get(k);
      const next = typeof val === 'function' ? val(prev) : val;
      if (next !== prev) { stateMap.set(k, next); scheduleRender(); }
    };
  })(mapKey);
  return [stateMap.get(mapKey), setState];
}

function useEffect(fn, deps) {
  const key = _currentKey;
  const idx = _effectIndex++;
  const mapKey = key + ':e:' + idx;
  const prev = effectMap.get(mapKey);
  const depsChanged = !prev || !deps || deps.some((d, i) => d !== (prev.deps || [])[i]);
  effectMap.set(mapKey, { fn, deps, depsChanged, cleanup: prev ? prev.cleanup : null });
}

function runEffects() {
  for (const [k, e] of effectMap.entries()) {
    if (e.depsChanged) {
      if (e.cleanup) { try { e.cleanup(); } catch(err) {} }
      const cleanup = e.fn();
      effectMap.set(k, { ...e, depsChanged: false, cleanup: cleanup || null });
    }
  }
}

// ── Component wrapper ──
function makeComponent(fn) {
  return function ComponentWrapper(props) {
    const savedKey = _currentKey;
    const savedStateIdx = _stateIndex;
    const savedEffectIdx = _effectIndex;
    _currentKey = fn.name + ':' + JSON.stringify(props && props.id ? props.id : _stateIndex);
    _stateIndex = 0;
    _effectIndex = 0;
    const result = fn(props);
    _currentKey = savedKey;
    _stateIndex = savedStateIdx;
    _effectIndex = savedEffectIdx;
    return result;
  };
}

// ── DOM Patcher ──
const _domCache = new Map();

function patch(container, vnode) {
  container.innerHTML = '';
  if (vnode == null) return;
  container.appendChild(vnodeToDom(vnode));
}

function vnodeToDom(vnode) {
  if (vnode == null) return document.createTextNode('');
  if (typeof vnode === 'string' || typeof vnode === 'number') {
    return document.createTextNode(String(vnode));
  }
  if (Array.isArray(vnode)) {
    const frag = document.createDocumentFragment();
    vnode.forEach(v => { if (v != null) frag.appendChild(vnodeToDom(v)); });
    return frag;
  }
  if (typeof vnode.type === 'function') {
    const savedKey = _currentKey;
    const savedStateIdx = _stateIndex;
    const savedEffectIdx = _effectIndex;
    _currentKey = (vnode.type.name || 'anon') + ':' + (_stateIndex);
    _stateIndex = 0;
    _effectIndex = 0;
    const result = vnode.type({ ...vnode.props, children: vnode.children });
    _currentKey = savedKey;
    _stateIndex = savedStateIdx + 1;
    _effectIndex = savedEffectIdx;
    return vnodeToDom(result);
  }
  const el = document.createElement(vnode.type);
  const props = vnode.props || {};
  for (const [k, v] of Object.entries(props)) {
    if (k === 'style' && typeof v === 'object') {
      Object.assign(el.style, v);
    } else if (k.startsWith('on') && typeof v === 'function') {
      el.addEventListener(k.slice(2).toLowerCase(), v);
    } else if (k === 'className') {
      el.className = v;
    } else if (k === 'htmlFor') {
      el.htmlFor = v;
    } else if (k === 'disabled') {
      if (v) el.disabled = true;
    } else if (k !== 'key' && k !== 'children') {
      try { el.setAttribute(k, v); } catch(e) {}
    }
  }
  (vnode.children || []).forEach(child => {
    if (child != null && child !== false) {
      el.appendChild(vnodeToDom(child));
    }
  });
  return el;
}

// ── createRoot API ──
function createRoot(el) {

      if (vnode && typeof vnode.type === 'function') {
        _rootComponent = vnode.type;
        _rootProps = vnode.props;
      }
      performRender();
    }
  };
}

// ─── UI HELPERS ───────────────────────────────────────────────────────────
function Tag(color, text) {
  return h('span', {style:{display:'inline-block',padding:'3px 10px',borderRadius:'20px',background:color+'22',color:color,fontSize:'10px',fontFamily:"'DM Mono',monospace",letterSpacing:'1px'}}, text);
}
function Card(children, extra) {
  return h('div', {style:Object.assign({background:C.bg2,border:'1px solid '+C.border,borderRadius:'12px',padding:'20px'},extra||{})}, children);
}
function CodeBlock(text) {
  return h('pre', {style:{background:C.bg3,border:'1px solid '+C.border,borderRadius:'8px',padding:'14px 16px',fontFamily:"'DM Mono',monospace",fontSize:'12px',lineHeight:'1.7',color:'#9ca3af',overflowX:'auto',whiteSpace:'pre-wrap',margin:'0'}}, text);
}
function Insight(color, label, text) {
  return h('div', {style:{background:'#0a0a0a',border:'1px solid '+color+'44',borderLeft:'3px solid '+color,borderRadius:'8px',padding:'16px',marginTop:'14px'}},
    h('div', {style:{color:color,fontSize:'10px',fontFamily:"'DM Mono',monospace",marginBottom:'8px'}}, label),
    h('p', {style:{color:'#e5e7eb',fontSize:'14px',lineHeight:'1.7',margin:'0'}}, text)
  );
}
function SimpleBanner(text) {
  if (!text) return null;
  return h('div', {style:{background:'#0a0e0a',border:'1px solid '+C.green+'33',borderLeft:'3px solid '+C.green,borderRadius:'8px',padding:'14px 16px',marginBottom:'20px'}},
    h('div', {style:{color:C.green,fontSize:'10px',fontFamily:"'DM Mono',monospace",marginBottom:'6px'}}, '✦ PLAIN ENGLISH'),
    h('p', {style:{color:'#d1fae5',fontSize:'14px',lineHeight:'1.7',margin:'0'}}, text)
  );
}

  var sp = isSimple ? lesson.simple : null;

  if (v === 'token-demo') {

    return h('div', null,
      SimpleBanner(sp),
      Card([
        h('div',{style:{color:C.muted,fontSize:'11px',fontFamily:"'DM Mono',monospace",marginBottom:'14px'}},'WORD → TOKEN COUNT'),
        h('div',{style:{display:'flex',flexWrap:'wrap',gap:'10px',marginBottom:'20px'}},
          words.map(function(w,i){
            return h('div',{key:i,style:{background:C.bg3,border:'1px solid '+(tc[i]>2?C.amber+'55':C.green+'55'),borderRadius:'8px',padding:'10px 14px',textAlign:'center'}},
              h('div',{style:{color:C.text,fontFamily:"'DM Mono',monospace",fontSize:'14px',fontWeight:'600',marginBottom:'4px'}},w),
              h('div',{style:{color:tc[i]>2?C.amber:C.green,fontSize:'12px',fontFamily:"'DM Mono',monospace"}},tc[i]+' token'+(tc[i]>1?'s':''))

          })
        ),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}},
          lesson.keypoints.map(function(k,i){
            return h('div',{key:i,style:{background:C.bg3,borderRadius:'8px',padding:'14px'}},
              h('div',{style:{color:C.muted,fontSize:'11px',fontFamily:"'DM Mono',monospace",marginBottom:'4px'}},k.label),
              h('div',{style:{color:col,fontFamily:"'DM Mono',monospace",fontSize:'20px',fontWeight:'700',marginBottom:'4px'}},k.value),

      Insight(col, isSimple?'✦ ANALOGY':'MENTAL MODEL', isSimple?lesson.analogySimple:lesson.analogyPro),

// ─── STATEFUL MCP WIDGET ──────────────────────────────────────────────────
function McpWidget(lesson, col, isSimple) {
  var active = useState(function(){ return lesson.servers.map(function(_,i){return i<3;}); });
  var activeArr = active[0], setActive = active[1];
  var total = lesson.servers.reduce(function(s,sv,i){return s+(activeArr[i]?sv.tokens:0);},0);
  var lvl = total>15000?C.red:total>8000?C.amber:C.green;
  return h('div',null,
    SimpleBanner(isSimple?lesson.simple:null),
    Card([
      h('div',{key:'hdr',style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}},
        h('div',{style:{color:C.muted,fontSize:'11px',fontFamily:"'DM Mono',monospace"}},'ACTIVE MCP OVERHEAD'),
        h('div',{style:{fontFamily:"'DM Mono',monospace",fontWeight:'700',fontSize:'18px',color:lvl}},total.toLocaleString()+' tokens')
      ),
      h('div',{key:'bar',style:{height:'8px',background:C.bg3,borderRadius:'4px',marginBottom:'16px',overflow:'hidden'}},
        h('div',{style:{height:'100%',width:Math.min((total/30000)*100,100)+'%',background:lvl,borderRadius:'4px',transition:'width 0.3s'}})
      ),
      h('div',{key:'grid',style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}},
        lesson.servers.map(function(sv,i){
          var on = activeArr[i];
          return h('div',{key:i,className:'mcp-chip',
            onClick:function(){setActive(function(p){var n=p.slice();n[i]=!n[i];return n;});},
            style:{display:'flex',gap:'10px',alignItems:'center',padding:'10px 12px',border:'1px solid '+(on?col+'44':C.border),borderRadius:'8px',background:on?col+'08':'transparent'}},
            h('div',{style:{width:'16px',height:'16px',borderRadius:'4px',border:'2px solid '+(on?col:C.dim),background:on?col:'transparent',flexShrink:'0',display:'flex',alignItems:'center',justifyContent:'center'}},
              on&&h('span',{style:{color:'#000',fontSize:'10px',fontWeight:'900'}},'✓')
            ),
            h('div',{style:{flex:'1'}},
              h('div',{style:{color:C.text,fontSize:'12px',fontFamily:"'DM Mono',monospace"}},sv.name),
              h('div',{style:{color:C.muted,fontSize:'11px'}},sv.tokens.toLocaleString()+' tokens')
            )
          );
        })
      ),
      h('div',{key:'hint',style:{color:C.muted,fontSize:'11px',marginTop:'12px'}},'← Click to toggle. Watch the token cost change.')
    ]),
    Insight(col, 'SOLUTION', lesson.tip)
  );
}

  if (!term) return null;

    h('div',{onClick:function(e){e.stopPropagation();},style:{background:C.bg2,border:'1px solid '+C.amber+'44',borderRadius:'12px',padding:'20px',maxWidth:'400px',width:'100%'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'12px'}},
        h('div',{style:{color:C.amber,fontFamily:"'DM Mono',monospace",fontSize:'12px',textTransform:'uppercase'}},term),
        h('button',{onClick:onClose,style:{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:'22px',lineHeight:'1',padding:'0',display:'flex',alignItems:'center',justifyContent:'center'}},'×')
      ),
      h('p',{style:{color:C.text,fontSize:'14px',lineHeight:'1.7',margin:'0'}},GLOSSARY[term]||'')
    )
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────
function App() {
  var screenState = useState('onboard');
  var screen = screenState[0], setScreen = screenState[1];

  var audState = useState(null);
  var audience = audState[0], setAudience = audState[1];

  var smState = useState(false);
  var simpleMode = smState[0], setSimpleMode = smState[1];

  var modState = useState(null);
  var activeMod = modState[0], setActiveMod = modState[1];

  var lesState = useState(null);
  var activeLesson = lesState[0], setActiveLesson = lesState[1];

  var compState = useState([]);
  var completedArr = compState[0], setCompletedArr = compState[1];

  var xpState = useState(0);
  var xp = xpState[0], setXp = xpState[1];

  var glState = useState(null);
  var glossaryTerm = glState[0], setGlossaryTerm = glState[1];

  var isCompleted = function(id){ return completedArr.indexOf(id) >= 0; };

  function markDone(id, pts) {
    if (!isCompleted(id)) {
      setCompletedArr(function(p){ return p.concat([id]); });
      setXp(function(p){ return p + pts; });
    }
  }

  function nav(scr) {
    setScreen(scr);
    window.scrollTo(0,0);
  }

  function goBack() {
    if (screen === 'lesson') nav('module');
    else nav('home');
  }

  var totalLessons = MODULES.reduce(function(s,m){return s+m.lessons.length;},0);
  var totalXP = MODULES.reduce(function(s,m){return m.lessons.reduce(function(l,n){return l+n.xp;},s);},0);
  var rank = RANKS.slice().reverse().find(function(r){return xp>=r.min;}) || RANKS[0];
  var nextRank = RANKS[RANKS.indexOf(rank)+1] || null;
  var modeColor = audience ? MODES[audience].color : C.green;

  // ── NAV BAR ──
  function NavBar(backLabel) {
    return h('div',{style:{position:'sticky',top:'0',background:'rgba(6,6,8,0.95)',backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',borderBottom:'1px solid '+C.border,padding:'12px 16px',zIndex:'50',display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('button',{onClick:goBack,style:{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:'13px',padding:'0',fontFamily:"'DM Sans',system-ui,sans-serif"}},'\u2190 '+backLabel),
      h('button',{className:'tog',onClick:function(){setSimpleMode(function(p){return !p;});},style:{background:simpleMode?C.amber+'22':'transparent',border:'1px solid '+(simpleMode?C.amber:C.border),borderRadius:'20px',padding:'5px 14px',color:simpleMode?C.amber:C.muted,cursor:'pointer',fontSize:'11px',fontFamily:"'DM Mono',monospace"}},simpleMode?'✦ Plain English ON':'✦ Plain English')
    );
  }

  // ── ONBOARD ──
  if (screen === 'onboard') {
    return h('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px 16px'}},
      h('div',{className:'fade-in',style:{maxWidth:'480px',width:'100%'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'32px'}},
          h('div',{className:'pulse',style:{width:'8px',height:'8px',borderRadius:'50%',background:C.green}}),
          h('div',{style:{color:C.green,fontFamily:"'DM Mono',monospace",fontSize:'11px',letterSpacing:'2px'}},'TOKEN MASTERY — v1.0')
        ),
        h('h1',{style:{fontFamily:"'Playfair Display',Georgia,serif",fontSize:'clamp(32px,7vw,48px)',fontWeight:'900',lineHeight:'1.1',color:'#f9fafb',margin:'0 0 16px'}},
          'Stop hitting',h('br'),'context ',h('span',{style:{color:C.green}},'limits.')
        ),
        h('p',{style:{color:C.muted,fontSize:'15px',lineHeight:'1.7',margin:'0 0 36px'}},'A hands-on course in token optimization for Claude Code, ChatGPT, Gemini, and agentic AI systems. Built for everyone — from first-time AI users to staff engineers.'),
        h('div',{style:{color:C.muted,fontSize:'11px',fontFamily:"'DM Mono',monospace",marginBottom:'14px',letterSpacing:'1px'}},'WHO ARE YOU? (this adapts the course)'),
        h('div',{style:{display:'flex',flexDirection:'column',gap:'10px',marginBottom:'28px'}},
          Object.keys(MODES).map(function(key){
            var mode = MODES[key];
            var sel = audience === key;
            return h('div',{key:key,onClick:function(){setAudience(key);},style:{display:'flex',gap:'14px',padding:'16px 20px',border:'2px solid '+(sel?mode.color:C.border),borderRadius:'12px',cursor:'pointer',background:sel?mode.color+'10':C.bg2,transition:'all 0.2s',alignItems:'center'}},
              h('div',{style:{width:'40px',height:'40px',borderRadius:'10px',background:mode.color+'22',display:'flex',alignItems:'center',justifyContent:'center',color:mode.color,fontSize:'20px',flexShrink:'0'}},mode.icon),
              h('div',{style:{flex:'1'}},
                h('div',{style:{color:sel?mode.color:C.text,fontWeight:'700',fontSize:'15px',marginBottom:'3px'}},mode.label),
                h('div',{style:{color:C.muted,fontSize:'12px'}},mode.desc)
              ),
              sel && h('div',{style:{color:mode.color,fontSize:'20px',fontWeight:'700'}},'✓')
            );
          })
        ),
        h('button',{disabled:!audience,onClick:function(){if(audience){if(audience==='explorer')setSimpleMode(true);nav('home');}},style:{width:'100%',padding:'16px',background:audience?MODES[audience].color:C.dim,border:'none',borderRadius:'10px',color:'#000',fontWeight:'700',fontSize:'15px',cursor:audience?'pointer':'not-allowed',fontFamily:"'DM Mono',monospace",letterSpacing:'0.5px',opacity:audience?'1':'0.5'}},'START THE COURSE →'),
        audience && h('div',{style:{color:C.muted,fontSize:'11px',textAlign:'center',marginTop:'12px',fontFamily:"'DM Mono',monospace"}},MODES[audience].tag)
      )
    );
  }

  // ── LESSON SCREEN ──
  if (screen === 'lesson' && activeLesson && activeMod) {
    var col = activeMod.color;
    var done = isCompleted(activeLesson.id);
    return h('div',{style:{minHeight:'100vh'}},
      NavBar(activeMod.title),
      h('div',{className:'fade-in',style:{maxWidth:'700px',margin:'0 auto',padding:'28px 16px 48px'}},
        Tag(col, activeLesson.type.toUpperCase()),
        h('h1',{style:{fontFamily:"'Playfair Display',Georgia,serif",fontSize:'24px',fontWeight:'900',color:'#f9fafb',margin:'10px 0 6px',lineHeight:'1.2'}},activeLesson.title),
        h('div',{style:{color:C.muted,fontSize:'12px',fontFamily:"'DM Mono',monospace",marginBottom:'28px'}},activeLesson.xp+' XP'),
        renderLesson(activeLesson, col, simpleMode),
        h('div',{style:{marginTop:'36px',paddingTop:'24px',borderTop:'1px solid '+C.border}},
          done
            ? h('div',{style:{display:'flex',alignItems:'center',gap:'12px',padding:'16px 20px',background:C.green+'11',border:'1px solid '+C.green+'33',borderRadius:'10px'}},
                h('span',{style:{color:C.green,fontSize:'20px'}},'✓'),
                h('div',null,
                  h('div',{style:{color:C.green,fontFamily:"'DM Mono',monospace",fontSize:'13px'}},'Lesson complete — '+activeLesson.xp+' XP earned'),
                  h('div',{style:{color:C.muted,fontSize:'12px',marginTop:'2px'}},'You can revisit this lesson anytime')
                )
              )
            : h('button',{onClick:function(){markDone(activeLesson.id,activeLesson.xp);},style:{width:'100%',padding:'16px',background:col,border:'none',borderRadius:'10px',color:'#000',fontWeight:'700',fontSize:'15px',cursor:'pointer',fontFamily:"'DM Mono',monospace"}},'MARK COMPLETE → +'+activeLesson.xp+' XP')
        )
      ),
      GlossaryModal(glossaryTerm, function(){setGlossaryTerm(null);})
    );
  }

  // ── MODULE SCREEN ──
  if (screen === 'module' && activeMod) {
    var col2 = activeMod.color;
    var doneCount = activeMod.lessons.filter(function(l){return isCompleted(l.id);}).length;
    var pct = Math.round((doneCount/activeMod.lessons.length)*100);
    return h('div',{style:{minHeight:'100vh'}},
      NavBar('All Modules'),
      h('div',{className:'fade-in',style:{maxWidth:'700px',margin:'0 auto',padding:'28px 16px 48px'}},
        h('div',{style:{display:'flex',gap:'14px',alignItems:'flex-start',marginBottom:'20px'}},
          h('div',{style:{width:'56px',height:'56px',borderRadius:'14px',background:col2+'22',border:'1px solid '+col2+'44',display:'flex',alignItems:'center',justifyContent:'center',color:col2,fontSize:'26px',flexShrink:'0'}},activeMod.icon),
          h('div',null,
            Tag(col2, activeMod.tag),
            h('h1',{style:{fontFamily:"'Playfair Display',Georgia,serif",fontSize:'22px',fontWeight:'900',color:'#f9fafb',margin:'8px 0 6px'}},activeMod.title),
            h('p',{style:{color:C.muted,fontSize:'13px',margin:'0'}},activeMod.summary)
          )
        ),
        h('div',{style:{background:C.bg2,border:'1px solid '+col2+'33',borderLeft:'3px solid '+col2,borderRadius:'8px',padding:'16px',marginBottom:'24px'}},
          h('div',{style:{color:col2,fontSize:'10px',fontFamily:"'DM Mono',monospace",marginBottom:'8px'}},'◈ YOUR SCENARIO'),
          h('p',{style:{color:'#e5e7eb',fontSize:'13px',lineHeight:'1.7',margin:'0',fontStyle:'italic'}},activeMod.narrative)
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'20px'}},
          h('div',{style:{flex:'1',height:'4px',background:C.bg3,borderRadius:'2px'}},
            h('div',{style:{height:'100%',width:pct+'%',background:col2,borderRadius:'2px',transition:'width 0.5s'}})
          ),
          h('span',{style:{color:C.muted,fontSize:'12px',fontFamily:"'DM Mono',monospace"}},doneCount+'/'+activeMod.lessons.length+' complete')
        ),
        h('div',{style:{display:'flex',flexDirection:'column',gap:'10px'}},
          activeMod.lessons.map(function(lesson,i){
            var isDone = isCompleted(lesson.id);
            return h('div',{key:lesson.id,className:'lesson-row',
              onClick:function(){setActiveLesson(lesson);nav('lesson');},
              style:{display:'flex',gap:'14px',padding:'18px 20px',border:'1px solid '+(isDone?col2+'44':C.border),borderRadius:'10px',background:isDone?col2+'08':C.bg2,alignItems:'center'}},
              h('div',{style:{width:'34px',height:'34px',borderRadius:'50%',background:isDone?col2+'33':C.bg3,border:'2px solid '+(isDone?col2:C.dim),display:'flex',alignItems:'center',justifyContent:'center',color:isDone?col2:C.muted,fontSize:'13px',flexShrink:'0',fontFamily:"'DM Mono',monospace",fontWeight:'700'}},isDone?'✓':(i+1)),
              h('div',{style:{flex:'1'}},
                h('div',{style:{color:isDone?'#f9fafb':C.text,fontSize:'14px',fontWeight:'500',marginBottom:'4px'}},lesson.title),
                h('div',{style:{color:C.muted,fontSize:'12px'}},lesson.type.charAt(0).toUpperCase()+lesson.type.slice(1)+' · '+lesson.xp+' XP')
              ),
              h('div',{style:{color:C.dim,fontSize:'20px'}},'›')
            );
          })
        )
      ),
      GlossaryModal(glossaryTerm, function(){setGlossaryTerm(null);})
    );
  }

  // ── HOME SCREEN ──
  var totalDone = completedArr.length;
  var overallPct = Math.round((totalDone/totalLessons)*100);

  return h('div',{style:{minHeight:'100vh'}},
    h('div',{style:{borderBottom:'1px solid '+C.border,padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
        h('div',{className:'pulse',style:{width:'8px',height:'8px',borderRadius:'50%',background:C.green}}),
        h('div',{style:{color:C.green,fontFamily:"'DM Mono',monospace",fontSize:'11px',letterSpacing:'1.5px'}},'TOKEN MASTERY')
      ),
      h('div',{style:{display:'flex',gap:'8px',alignItems:'center'}},
        h('button',{className:'tog',onClick:function(){setSimpleMode(function(p){return !p;});},style:{background:simpleMode?C.amber+'22':'transparent',border:'1px solid '+(simpleMode?C.amber:C.border),borderRadius:'20px',padding:'5px 12px',color:simpleMode?C.amber:C.muted,cursor:'pointer',fontSize:'11px',fontFamily:"'DM Mono',monospace"}},simpleMode?'✦ Plain English ON':'✦ Plain English'),
        h('button',{onClick:function(){nav('onboard');},style:{background:'none',border:'1px solid '+C.border,borderRadius:'20px',padding:'5px 12px',color:C.muted,cursor:'pointer',fontSize:'11px',fontFamily:"'DM Mono',monospace"}},'Switch')
      )
    ),
    h('div',{className:'fade-in',style:{maxWidth:'700px',margin:'0 auto',padding:'28px 16px 48px'}},
      h('div',{style:{marginBottom:'32px'}},
        h('div',{style:{display:'flex',gap:'8px',alignItems:'center',marginBottom:'12px'}},
          audience && Tag(modeColor, MODES[audience].icon+' '+MODES[audience].label+' mode'),
          h('span',{style:{color:C.muted,fontSize:'11px',fontFamily:"'DM Mono',monospace"}},xp+' XP · '+rank.name)
        ),
        h('h1',{style:{fontFamily:"'Playfair Display',Georgia,serif",fontSize:'clamp(28px,6vw,40px)',fontWeight:'900',lineHeight:'1.1',color:'#f9fafb',margin:'0 0 12px'}},
          'Stop hitting',h('br'),h('span',{style:{color:C.green}},'context limits.')
        ),
        h('p',{style:{color:C.muted,fontSize:'14px',lineHeight:'1.7',margin:'0 0 24px'}},
          !audience||audience==='explorer' ? 'Learn how to get more out of AI tools without running into frustrating memory limits. No coding background needed.'
          : audience==='practitioner' ? 'Master the techniques that keep your AI sessions running at full quality — from prompt design to session architecture.'
          : 'Deep-dive into token economics, context architecture, and automated optimization pipelines across Claude, GPT-4o, Gemini, and agentic frameworks.'
        )
      ),
      Card([
        h('div',{key:'top',style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'14px'}},
          h('div',null,
            h('div',{style:{color:C.muted,fontSize:'10px',fontFamily:"'DM Mono',monospace",marginBottom:'4px'}},'RANK'),
            h('div',{style:{color:rank.color,fontSize:'22px',fontWeight:'700',fontFamily:"'DM Mono',monospace"}},rank.name)
          ),
          h('div',{style:{textAlign:'right'}},
            h('div',{style:{color:C.muted,fontSize:'10px',fontFamily:"'DM Mono',monospace",marginBottom:'4px'}},'PROGRESS'),
            h('div',{style:{color:C.text,fontSize:'22px',fontWeight:'700',fontFamily:"'DM Mono',monospace"}},totalDone,h('span',{style:{color:C.dim}},'/'+totalLessons))
          )
        ),
        h('div',{key:'bar',style:{height:'6px',background:C.bg3,borderRadius:'3px',marginBottom:'8px',overflow:'hidden'}},
          h('div',{style:{height:'100%',width:overallPct+'%',background:'linear-gradient(90deg,'+C.green+','+C.blue+')',borderRadius:'3px',transition:'width 0.6s'}})
        ),
        h('div',{key:'foot',style:{display:'flex',justifyContent:'space-between'}},
          h('div',{style:{color:C.muted,fontSize:'11px',fontFamily:"'DM Mono',monospace"}},xp+'/'+(nextRank?nextRank.min:totalXP)+' XP → '+(nextRank?nextRank.name:'MAX')),
          h('div',{style:{color:C.muted,fontSize:'11px'}},overallPct+'% complete')
        )
      ], {marginBottom:'24px'}),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px',marginBottom:'24px'}},
        [{label:'Lessons',value:totalLessons,color:C.green},{label:'Total XP',value:totalXP,color:C.purple},{label:'Tools Covered',value:'7+',color:C.blue}].map(function(st,i){
          return Card([
            h('div',{key:'v',style:{color:st.color,fontFamily:"'DM Mono',monospace",fontSize:'24px',fontWeight:'700'}},st.value),
            h('div',{key:'l',style:{color:C.muted,fontSize:'11px',fontFamily:"'DM Mono',monospace",marginTop:'2px'}},st.label)
          ], {textAlign:'center',key:i});
        })
      ),
      h('div',{style:{background:C.bg2,border:'1px solid '+C.amber+'44',borderLeft:'3px solid '+C.amber,borderRadius:'8px',padding:'16px',marginBottom:'24px'}},
        h('div',{style:{color:C.amber,fontSize:'10px',fontFamily:"'DM Mono',monospace",marginBottom:'8px'}},'◈ THE SCENARIO THIS COURSE SOLVES'),
        h('p',{style:{color:'#fef3c7',fontSize:'14px',lineHeight:'1.7',margin:'0',fontStyle:'italic'}},"\"It's 3pm. You've been working with Claude Code for 3 hours. The responses get vague. It 'forgets' decisions made an hour ago. By 4pm the session is broken and you've lost progress. This course explains exactly why — and gives you the tools to never experience it again.\"")
      ),
      h('div',{style:{color:C.muted,fontSize:'11px',fontFamily:"'DM Mono',monospace",marginBottom:'12px',letterSpacing:'1px'}},'COURSE MODULES'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:'10px'}},
        MODULES.map(function(mod){
          var d = mod.lessons.filter(function(l){return isCompleted(l.id);}).length;
          var p = Math.round((d/mod.lessons.length)*100);
          return h('div',{key:mod.id,className:'mod-card',
            onClick:function(){setActiveMod(mod);nav('module');},
            style:{display:'flex',gap:'14px',padding:'18px 16px',border:'1px solid '+C.border,borderRadius:'12px',background:C.bg2,alignItems:'center'}},
            h('div',{style:{width:'50px',height:'50px',borderRadius:'12px',background:mod.color+'22',border:'1px solid '+mod.color+'33',display:'flex',alignItems:'center',justifyContent:'center',color:mod.color,fontSize:'22px',flexShrink:'0'}},mod.icon),
            h('div',{style:{flex:'1',minWidth:'0'}},
              h('div',{style:{color:mod.color,fontSize:'10px',fontFamily:"'DM Mono',monospace",marginBottom:'3px'}},mod.tag),
              h('div',{style:{color:'#f9fafb',fontSize:'15px',fontWeight:'600',marginBottom:'3px'}},mod.title),
              h('div',{style:{color:C.muted,fontSize:'12px',marginBottom:p>0?'8px':'0'}},mod.summary),
              p>0 && h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
                h('div',{style:{flex:'1',height:'3px',background:C.bg3,borderRadius:'2px'}},
                  h('div',{style:{height:'100%',width:p+'%',background:mod.color,borderRadius:'2px'}})
                ),
                h('span',{style:{color:C.muted,fontSize:'10px',fontFamily:"'DM Mono',monospace"}},p+'%')
              )
            ),
            h('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'4px',flexShrink:'0'}},
              h('div',{style:{color:C.dim,fontSize:'20px'}},'›'),
              h('div',{style:{color:C.muted,fontSize:'10px',fontFamily:"'DM Mono',monospace"}},mod.lessons.length+' lessons')
            )
          );
        })
      ),
      h('div',{style:{color:C.dim,fontSize:'11px',fontFamily:"'DM Mono',monospace",textAlign:'center',marginTop:'32px'}},'Token Mastery v1.0 · kamalraj21.github.io')
    ),
    GlossaryModal(glossaryTerm, function(){setGlossaryTerm(null);})
  );
}

// ── BOOT ──
var root = document.getElementById('app');
createRoot(root).render(h(App, null));

})();
</script>
